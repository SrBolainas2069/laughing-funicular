<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TurnitoArg FINAL</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, addDoc, onSnapshot,
  updateDoc, doc, arrayUnion, arrayRemove, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIuuojNXzkSh4RR4Adwkm1uWEjUZ2aP2w",
  authDomain: "turnitoarg-7ace7.firebaseapp.com",
  projectId: "turnitoarg-7ace7",
  storageBucket: "turnitoarg-7ace7.firebasestorage.app",
  messagingSenderId: "793271454131",
  appId: "1:793271454131:web:f0224ce0646a2beaf363c6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let partidoActual = null;

// AUTH
window.register = async () => {
  const cred = await createUserWithEmailAndPassword(auth,email.value,pass.value);
  await setDoc(doc(db,"usuarios",cred.user.uid),{
    nombre:"Jugador",
    puntos:0
  });
};

window.login = async () => {
  await signInWithEmailAndPassword(auth,email.value,pass.value);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,user=>{
  if(user){
    authDiv.style.display="none";
    appDiv.style.display="block";
    cargarPartidos();
    cargarRanking();
  } else {
    authDiv.style.display="block";
    appDiv.style.display="none";
  }
});

// PARTIDOS
window.crearPartido = async ()=>{
  await addDoc(collection(db,"partidos"),{
    zona:zona.value,
    fecha:fecha.value,
    hora:hora.value,
    jugadores:[auth.currentUser.uid],
    max:10
  });
};

function cargarPartidos(){
  onSnapshot(collection(db,"partidos"),snap=>{
    partidos.innerHTML="";
    snap.forEach(d=>{
      const p=d.data();
      partidos.innerHTML+=`
      <div class="card">
        <h3>${p.zona}</h3>
        ${p.fecha} ${p.hora}<br>
        👥 ${p.jugadores.length}/${p.max}<br>
        <button onclick="join('${d.id}')">Entrar</button>
        <button onclick="leave('${d.id}')">Salir</button>
        <button onclick="abrirChat('${d.id}')">Chat</button>
      </div>`;
    });
  });
}

window.join = async id=>{
  await updateDoc(doc(db,"partidos",id),{
    jugadores:arrayUnion(auth.currentUser.uid)
  });
};

window.leave = async id=>{
  await updateDoc(doc(db,"partidos",id),{
    jugadores:arrayRemove(auth.currentUser.uid)
  });
};

// CHAT
window.abrirChat = (id)=>{
  partidoActual=id;
  chatBox.style.display="block";

  onSnapshot(collection(db,"partidos",id,"chat"),snap=>{
    mensajes.innerHTML="";
    snap.forEach(m=>{
      const d=m.data();
      mensajes.innerHTML+=`<div><b>${d.user}:</b> ${d.text}</div>`;
    });
  });
};

window.enviarMensaje = async ()=>{
  if(!partidoActual) return;
  await addDoc(collection(db,"partidos",partidoActual,"chat"),{
    user:auth.currentUser.email,
    text:msg.value
  });
  msg.value="";
};

// RANKING
function cargarRanking(){
  onSnapshot(collection(db,"usuarios"),snap=>{
    ranking.innerHTML="";
    snap.forEach(u=>{
      const d=u.data();
      ranking.innerHTML+=`
      <div class="card">
        ${d.nombre} ⭐ ${d.puntos}
      </div>`;
    });
  });
}
</script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1b4b, #020617);
  color:white;
  text-align:center;
}

input {
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color:white;
  font-weight:bold;
}

.card {
  background:#0f172a;
  border:1px solid #312e81;
  border-radius:15px;
  padding:15px;
  margin:10px auto;
  width:90%;
  max-width:350px;
}

#mensajes {
  max-height:200px;
  overflow-y:auto;
  text-align:left;
}
</style>
</head>

<body>

<h1>⚽ TurnitoArg FINAL</h1>

<div id="authDiv">
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Pass"><br>
<button onclick="register()">Registrarse</button>
<button onclick="login()">Login</button>
</div>

<div id="appDiv" style="display:none">

<button onclick="logout()">Salir</button>

<h2>Crear partido</h2>
<input id="zona" placeholder="Zona">
<input id="fecha" type="date">
<input id="hora" type="time">
<button onclick="crearPartido()">Crear</button>

<h2>Partidos</h2>
<div id="partidos"></div>

<h2>Ranking</h2>
<div id="ranking"></div>

</div>

<div id="chatBox" style="display:none;">
<h2>Chat</h2>
<div id="mensajes" class="card"></div>
<input id="msg" placeholder="Mensaje">
<button onclick="enviarMensaje()">Enviar</button>
</div>

</body>
</html>
